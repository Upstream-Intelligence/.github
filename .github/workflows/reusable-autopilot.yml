name: Reusable Autopilot

on:
  workflow_call:
    inputs:
      stack:
        type: string
        default: "auto"
      node_version:
        type: string
        default: "20"
      python_version:
        type: string
        default: "3.12"
      working_directory:
        type: string
        default: "."
      auto_merge:
        type: boolean
        default: true
    secrets:
      AUTO_MERGE_TOKEN:
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autopilot-${{ github.repository }}
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect stack
        id: detect
        env:
          STACK: ${{ inputs.stack }}
        run: |
          NODE=false
          PY=false
          case "$STACK" in
            node)   NODE=true ;;
            python) PY=true ;;
            both)   NODE=true; PY=true ;;
            *)
              [ -f package.json ] && NODE=true
              { [ -f pyproject.toml ] || [ -f requirements.txt ]; } && PY=true
              ;;
          esac
          echo "node=$NODE" >> "$GITHUB_OUTPUT"
          echo "python=$PY" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.node == 'true'
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - name: Update Node deps (minor + patch only)
        if: steps.detect.outputs.node == 'true'
        id: node_update
        run: |
          npm ci --prefer-offline --no-audit --no-fund || npm install
          BEFORE=$(npm ls --depth=0 --json 2>/dev/null | jq -r '.dependencies // {} | to_entries[] | "\(.key)@\(.value.version // "unknown")"' | sort)
          npm update --save 2>/dev/null || true
          AFTER=$(npm ls --depth=0 --json 2>/dev/null | jq -r '.dependencies // {} | to_entries[] | "\(.key)@\(.value.version // "unknown")"' | sort)
          MAJOR=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            pkg=$(echo "$line" | sed 's/@[0-9].*//')
            old_v=$(echo "$BEFORE" | grep "^${pkg}@" | head -1 | sed 's/^[^@]*@//')
            new_v=$(echo "$AFTER" | grep "^${pkg}@" | head -1 | sed 's/^[^@]*@//')
            if [ -n "$old_v" ] && [ -n "$new_v" ] && [ "$old_v" != "$new_v" ]; then
              omajor=$(echo "$old_v" | cut -d. -f1)
              nmajor=$(echo "$new_v" | cut -d. -f1)
              [ "$omajor" != "$nmajor" ] && MAJOR=$((MAJOR+1))
            fi
          done <<< "$AFTER"
          echo "major_bumps=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: Lint --fix (Node)
        if: steps.detect.outputs.node == 'true'
        run: |
          if npm run 2>/dev/null | grep -q '^  lint:fix$'; then npm run lint:fix; fi
          if npm run 2>/dev/null | grep -q '^  format$'; then npm run format; fi
          if [ -f .eslintrc.json ] || [ -f .eslintrc.cjs ] || [ -f eslint.config.js ] || [ -f eslint.config.mjs ]; then
            npx --no-install eslint . --fix 2>/dev/null || true
          fi
          if [ -f .prettierrc ] || [ -f .prettierrc.json ] || [ -f prettier.config.js ]; then
            npx --no-install prettier --write . 2>/dev/null || true
          fi

      - name: Test (Node)
        if: steps.detect.outputs.node == 'true'
        continue-on-error: true
        run: |
          if npm run 2>/dev/null | grep -q '^  test$'; then npm test --if-present; fi

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.python == 'true'
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install uv
        if: steps.detect.outputs.python == 'true'
        run: pipx install uv

      - name: Update Python deps (minor + patch)
        if: steps.detect.outputs.python == 'true'
        run: |
          if [ -f pyproject.toml ]; then
            uv lock --upgrade 2>/dev/null || true
            uv sync 2>/dev/null || true
          fi

      - name: Lint --fix (Python)
        if: steps.detect.outputs.python == 'true'
        run: |
          if [ -f pyproject.toml ]; then
            uv run ruff check --fix . 2>/dev/null || true
            uv run ruff format . 2>/dev/null || true
          fi

      - name: Test (Python)
        if: steps.detect.outputs.python == 'true'
        continue-on-error: true
        run: |
          if [ -f pyproject.toml ]; then uv run pytest --tb=short -q 2>/dev/null || true; fi

      - name: Diff check
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN || secrets.GITHUB_TOKEN }}
          MAJOR_BUMPS: ${{ steps.node_update.outputs.major_bumps || '0' }}
          AUTO_MERGE: ${{ inputs.auto_merge }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="chore/auto-maintain-${DATE}"
          git config user.name "upstream-autopilot[bot]"
          git config user.email "autopilot@upstream.cx"
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "chore(autopilot): scheduled maintenance ${DATE}"
          git push -f origin "$BRANCH"

          AUTO_OK="false"
          if [ "$MAJOR_BUMPS" = "0" ] && [ "$AUTO_MERGE" = "true" ]; then
            AUTO_OK="true"
          fi

          BODY="Automated maintenance run.\n\n- Dep updates (minor + patch only)\n- Linter --fix applied\n- Formatter applied\n- Major version bumps detected: ${MAJOR_BUMPS}\n\nAuto-merge eligible: ${AUTO_OK}"

          if ! gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr create --title "chore(autopilot): scheduled maintenance ${DATE}" --body "$BODY" --base "$DEFAULT_BRANCH" --head "$BRANCH" --label "automerge" 2>/dev/null || true
          fi

          if [ "$AUTO_OK" = "true" ]; then
            gh pr merge "$BRANCH" --auto --squash 2>/dev/null || echo "auto-merge unavailable"
          fi
