name: Reusable Autopilot

on:
  workflow_call:
    inputs:
      stack:
        type: string
        default: "auto"
      node_version:
        type: string
        default: "20"
      python_version:
        type: string
        default: "3.12"
      working_directory:
        type: string
        default: "."
      auto_merge:
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autopilot-${{ github.repository }}
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect stack
        id: detect
        env:
          STACK: ${{ inputs.stack }}
        run: |
          NODE=false; PY=false
          PM="npm"
          [ -f pnpm-lock.yaml ] && PM="pnpm"
          [ -f yarn.lock ] && PM="yarn"
          [ -f bun.lockb ] && PM="bun"
          case "$STACK" in
            none)   ;;
            node)   NODE=true ;;
            python) PY=true ;;
            both)   NODE=true; PY=true ;;
            *)
              [ -f package.json ] && NODE=true
              { [ -f pyproject.toml ] || [ -f requirements.txt ]; } && PY=true
              ;;
          esac
          [ -f package.json ] || NODE=false
          { [ -f pyproject.toml ] || [ -f requirements.txt ]; } || PY=false
          echo "node=$NODE" >> "$GITHUB_OUTPUT"
          echo "python=$PY" >> "$GITHUB_OUTPUT"
          echo "pkg_manager=$PM" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.pkg_manager == 'pnpm' && steps.detect.outputs.node == 'true'
        with:
          run_install: false

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.node == 'true'
        with:
          node-version: ${{ inputs.node_version }}

      - name: Update Node deps
        if: steps.detect.outputs.node == 'true'
        env:
          PM: ${{ steps.detect.outputs.pkg_manager }}
        continue-on-error: true
        run: |
          case "$PM" in
            pnpm)
              pnpm install --frozen-lockfile 2>&1 || pnpm install --no-frozen-lockfile
              pnpm update --recursive --latest=false 2>/dev/null || true
              ;;
            yarn)
              yarn install --frozen-lockfile 2>&1 || yarn install
              yarn upgrade --latest=false 2>/dev/null || true
              ;;
            *)
              if [ -f package-lock.json ]; then
                npm ci --prefer-offline --no-audit --no-fund 2>&1 || npm install --no-audit --no-fund --force
              else
                npm install --no-audit --no-fund --force
              fi
              npm update --save 2>/dev/null || true
              ;;
          esac

      - name: Lint --fix Node
        if: steps.detect.outputs.node == 'true'
        env:
          PM: ${{ steps.detect.outputs.pkg_manager }}
        continue-on-error: true
        run: |
          case "$PM" in
            pnpm) pnpm run lint:fix 2>/dev/null || pnpm run format 2>/dev/null || true ;;
            *)
              if npm run 2>/dev/null | grep -q '^  lint:fix$'; then npm run lint:fix; fi
              if npm run 2>/dev/null | grep -q '^  format$'; then npm run format; fi
              ;;
          esac
          if [ -f .eslintrc.json ] || [ -f .eslintrc.cjs ] || [ -f eslint.config.js ] || [ -f eslint.config.mjs ]; then
            npx --no-install eslint . --fix 2>/dev/null || true
          fi
          if [ -f .prettierrc ] || [ -f .prettierrc.json ] || [ -f prettier.config.js ]; then
            npx --no-install prettier --write . 2>/dev/null || true
          fi

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.python == 'true'
        with:
          python-version: ${{ inputs.python_version }}

      - uses: astral-sh/setup-uv@v3
        if: steps.detect.outputs.python == 'true'

      - name: Update Python deps
        if: steps.detect.outputs.python == 'true'
        continue-on-error: true
        run: |
          if [ -f pyproject.toml ]; then
            uv lock --upgrade 2>/dev/null || true
            uv sync 2>/dev/null || true
          fi

      - name: Lint --fix Python
        if: steps.detect.outputs.python == 'true'
        continue-on-error: true
        run: |
          if [ -f pyproject.toml ]; then
            uv run ruff check --fix . 2>/dev/null || true
            uv run ruff format . 2>/dev/null || true
          fi

      - name: Diff check
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and open PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTO_MERGE: ${{ inputs.auto_merge }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="chore/auto-maintain-${DATE}"
          git config user.name "upstream-autopilot[bot]"
          git config user.email "autopilot@upstream.cx"
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "chore(autopilot): scheduled maintenance ${DATE}"
          git push -f origin "$BRANCH"

          BODY="Automated maintenance: dep updates (minor + patch), lint --fix, formatter."

          if ! gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr create --title "chore(autopilot): scheduled maintenance ${DATE}" --body "$BODY" --base "$DEFAULT_BRANCH" --head "$BRANCH" --label "automerge" 2>/dev/null || true
          fi

          if [ "$AUTO_MERGE" = "true" ]; then
            gh pr merge "$BRANCH" --auto --squash 2>/dev/null || true
          fi
