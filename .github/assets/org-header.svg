<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="280" viewBox="0 0 1280 280">
  <rect width="1280" height="280" fill="#0F0F0E"/>

  <!-- Detection-accent dot (subtle visual signal) -->
  <circle cx="64" cy="116" r="6" fill="#A78BFA"/>

  <!-- Wordmark: upstream + .cx, Inter Bold, matches site display typography -->
  <text x="80" y="124"
        font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="56" letter-spacing="-1.5" fill="#0454F1">upstream</text>
  <text x="362" y="124"
        font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="56" letter-spacing="-1.5" fill="#475569">.cx</text>

  <!-- Tagline -->
  <text x="80" y="166"
        font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400" font-size="18" fill="#A8A29E">Care Intelligence Platform for healthcare practices.</text>

  <!-- Thin rule, brand blue at 40% -->
  <line x1="80" y1="196" x2="848" y2="196" stroke="#0454F1" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Specialty strip -->
  <text x="80" y="240"
        font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-weight="500" font-size="13" letter-spacing="0.5" fill="#475569">ABA  ·  SNF  ·  PT/OT  ·  Dental  ·  Dialysis  ·  Imaging  ·  Home Health  ·  Behavioral Health</text>
